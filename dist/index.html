<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Concise learning notes from daily technology and AI videos.">
    <title>Daily Digest | Learning Notes</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-app-mode="static">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">D</div>
          <div>
            <h1>Daily Digest</h1>
            <p>Curated learning notes</p>
          </div>
        </div>

        <section class="panel">
          <div class="panel-header">
            <h2>Sources</h2>
            <span id="source-count">0</span>
          </div>
          <div id="sources" class="source-list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Routine</h2>
          </div>
          <dl class="stats">
            <div><dt>Daily limit</dt><dd id="daily-limit">-</dd></div>
            <div><dt>Per channel</dt><dd id="per-channel-limit">-</dd></div>
            <div><dt>Lookback</dt><dd id="lookback-days">-</dd></div>
            <div><dt>Notes</dt><dd id="note-count">-</dd></div>
          </dl>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Last published</p>
            <h2 id="latest-run-title">Loading</h2>
          </div>
          <span class="publish-state static-only"><span class="live-dot" aria-hidden="true"></span>Updated daily</span>
        </header>

        <section class="overview-band">
          <div>
            <span class="metric-label">Videos reviewed</span>
            <strong id="processed-count">-</strong>
          </div>
          <div>
            <span class="metric-label">Latest notes</span>
            <strong id="latest-video-count">-</strong>
          </div>
          <div>
            <span class="metric-label">Daily candidate pool</span>
            <strong id="candidate-limit">-</strong>
          </div>
        </section>

        <div class="content-grid">
          <section class="notes-pane">
            <div class="section-title">
              <h2>Notes</h2>
              <input id="search" type="search" placeholder="Search notes">
            </div>
            <div id="notes-list" class="notes-list"></div>
          </section>

          <section class="reader-pane">
            <div id="empty-state" class="empty-state">
              <h2>Select a note</h2>
              <p>Generated learning notes will appear here.</p>
            </div>
            <article id="reader" class="reader hidden"></article>
          </section>
        </div>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
